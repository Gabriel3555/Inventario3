<div class="dashboard-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <img src="/favicon.ico" alt="" class="logo-icon" />
        <div class="logo-text">
          <div class="logo-title">StockPro</div>
          <div class="logo-subtitle">Punto de Venta</div>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-title">VENTAS</div>
        <a routerLink="/vendedor/ventas" routerLinkActive="active" class="nav-item">
          <span class="nav-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
          </span>
          <span class="nav-label">Mis Ventas</span>
        </a>
        <a routerLink="/vendedor/productos" routerLinkActive="active" class="nav-item">
          <span class="nav-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 9.4 7.55 4.24"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="m3.27 6.96 8.73 5.05"/><path d="M12 12v9.5"/><path d="M20.73 6.96l-8.73 5.05"/><path d="M12 21.5V12"/></svg>
          </span>
          <span class="nav-label">Productos</span>
        </a>
        <a routerLink="/vendedor/lotes" routerLinkActive="active" class="nav-item">
          <span class="nav-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3.5"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/><path d="M17.5 18a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M18 15v2.5"/></svg>
          </span>
          <span class="nav-label">Lotes</span>
        </a>
        <a routerLink="/vendedor/clientes" routerLinkActive="active" class="nav-item">
          <span class="nav-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </span>
          <span class="nav-label">Clientes</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">{{ auth.user()?.nombre?.substring(0, 2)?.toUpperCase() || 'VE' }}</div>
        <div class="user-details">
          <div class="user-name">{{ auth.user()?.nombre || 'Vendedor' }}</div>
          <div class="user-role">Ventas</div>
        </div>
      </div>
      <button class="btn-logout" (click)="auth.logout()">
        Cerrar Sesión
      </button>
    </div>
  </aside>

  <!-- Contenido principal -->
  <main class="main-content">
    <header class="main-header">
      <div class="header-left">
        <button class="toggle-sidebar" type="button">☰</button>
        <h1 class="page-title">{{ pageTitle }}</h1>
      </div>
    </header>

    <div class="layout-outlet">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
